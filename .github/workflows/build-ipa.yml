name: Build unsigned IPA
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: macos-15
    env:
      SCHEME: Translate
      CONFIGURATION: Release
      SDK: iphoneos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate .xcodeproj
        run: xcodegen generate
      - name: Build unsigned .app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "Translate.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk "$SDK" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            clean build
      - name: Package into .ipa
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/${CONFIGURATION}-iphoneos/${SCHEME}.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Не найден .app по пути $APP_PATH"
            find build/Build/Products -maxdepth 3
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -X "${SCHEME}-unsigned.ipa" Payload
          mkdir -p out
          mv "${SCHEME}-unsigned.ipa" out/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SCHEME }}-unsigned-ipa
          path: out/${{ env.SCHEME }}-unsigned.ipa
          retention-days: 14
      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ env.SCHEME }}-unsigned.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}